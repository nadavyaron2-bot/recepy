name: Auto Build and Update

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Find and Prepare gradlew
        run: |
          GRADLEW_PATH=$(find . -name gradlew | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Error: gradlew not found!"
            exit 1
          fi
          chmod +x "$GRADLEW_PATH"
          echo "GRADLEW_PATH=$GRADLEW_PATH" >> $GITHUB_ENV
          echo "PROJECT_ROOT=$(dirname "$GRADLEW_PATH")" >> $GITHUB_ENV

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > debug.keystore

      - name: Build APK
        run: |
          cd ${{ env.PROJECT_ROOT }}
          ./gradlew :app:assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Update Version and Files
        run: |
          VERSION_PROPS="version.properties"
          MAJOR=$(grep "major=" "$VERSION_PROPS" | cut -d'=' -f2)
          MINOR=$(grep "minor=" "$VERSION_PROPS" | cut -d'=' -f2)
          PATCH=$(grep "patch=" "$VERSION_PROPS" | cut -d'=' -f2)
          VCODE=$(grep "versionCode=" "$VERSION_PROPS" | cut -d'=' -f2)
          
          VNAME="$MAJOR.$MINOR.$PATCH"
          
          mkdir -p update
          find . -name "*.apk" -not -path "*/update/*" -exec cp {} update/app-release.apk \;
          
          echo "{
            \"versionCode\": $VCODE,
            \"versionName\": \"$VNAME\",
            \"downloadUrl\": \"https://github.com/nadavyaron2-bot/recepy/raw/refs/heads/master/update/app-release.apk\"
          }" > update/version.json

      - name: Push updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add update/ version.properties
          git commit -m "Auto-update APK and version.json [skip ci]" || echo "No changes"
          git push origin master
