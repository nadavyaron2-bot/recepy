name: Auto Build and Update

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # ביטלתי זמנית את ה-cache כדי לפתור את השגיאה שקיבלת
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew :app:assembleDebug

      - name: Get current Version Code
        id: version_info
        run: |
          # פקודה חזקה יותר למציאת ה-versionCode גם ב-Groovy וגם ב-Kotlin DSL
          VERSION_CODE=$(grep -r "versionCode" app/build.gradle* | head -n 1 | awk '{print $NF}' | tr -d '()= \r\n')
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Prepare Update Folder
        run: |
          mkdir -p update
          # מחפש את ה-APK היכן שגרדל בדרך כלל שם אותו
          cp app/build/outputs/apk/debug/*.apk update/app-release.apk
          echo '{
            "versionCode": '${{ steps.version_info.outputs.version_code }}',
            "versionName": "1.0.3-auto",
            "downloadUrl": "https://github.com/nadavyaron2-bot/recepy/raw/refs/heads/master/update/app-release.apk"
          }' > update/version.json

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add update/
          # מוודא שיש שינויים לפני שעושים commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update APK and version.json [skip ci]" && git push)
