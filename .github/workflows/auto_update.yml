name: Auto Build and Update

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Get current Version Code
        id: version_info
        run: |
          VERSION_CODE=$(grep "versionCode" app/build.gradle | awk '{print $2}' | tr -d '\r\n')
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Prepare Update Folder
        run: |
          mkdir -p update
          cp app/build/outputs/apk/debug/app-debug.apk update/app-release.apk
          echo '{
            "versionCode": '${{ steps.version_info.outputs.version_code }}',
            "versionName": "1.0.3-auto",
            "downloadUrl": "https://github.com/nadavyaron2-bot/recepy/raw/refs/heads/master/update/app-release.apk"
          }' > update/version.json

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add update/
          git commit -m "Auto-update APK and version.json [skip ci]" || echo "No changes to commit"
          git push
