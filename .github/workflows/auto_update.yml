name: Auto Build and Update

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - List Files
        run: ls -R

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          elif [ -f "recepy/gradlew" ]; then
            cd recepy && chmod +x gradlew
          else
            echo "gradlew not found!" && exit 1
          fi

      - name: Build APK
        run: |
          if [ -f "gradlew" ]; then
            ./gradlew assembleDebug
          else
            cd recepy && ./gradlew assembleDebug
          fi

      - name: Update Version and Files
        run: |
          # ניסיון למצוא את הקובץ במיקום הראשי או בתת תיקייה
          APP_DIR="app"
          if [ ! -d "$APP_DIR" ]; then APP_DIR="recepy/app"; fi
          
          VERSION_CODE=$(grep "versionCode" $APP_DIR/build.gradle | head -n 1 | awk '{print $2}' | tr -d '()= \r\n')
          
          mkdir -p update
          cp $APP_DIR/build/outputs/apk/debug/*.apk update/app-release.apk
          
          echo "{
            \"versionCode\": $VERSION_CODE,
            \"versionName\": \"1.0.3-auto\",
            \"downloadUrl\": \"https://github.com/nadavyaron2-bot/recepy/raw/refs/heads/master/update/app-release.apk\"
          }" > update/version.json

      - name: Push updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add update/
          git commit -m "Auto-update APK and version.json [skip ci]" || echo "No changes"
          git push
