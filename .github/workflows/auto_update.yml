name: Auto Build and Update

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Find and Prepare gradlew
        run: |
          GRADLEW_PATH=$(find . -name gradlew | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Error: gradlew not found!"
            exit 1
          fi
          chmod +x "$GRADLEW_PATH"
          echo "GRADLEW_PATH=$GRADLEW_PATH" >> $GITHUB_ENV
          echo "PROJECT_ROOT=$(dirname "$GRADLEW_PATH")" >> $GITHUB_ENV

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > debug.keystore

      - name: Build APK
        run: |
          cd ${{ env.PROJECT_ROOT }}
          ./gradlew :app:assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Update Version and Files
        run: |
          # Extract version from app/build.gradle
          BUILD_GRADLE="app/build.gradle"
          VCODE=$(grep "versionCode" "$BUILD_GRADLE" | head -1 | awk '{print $2}')
          VNAME=$(grep "versionName" "$BUILD_GRADLE" | head -1 | awk '{print $2}' | tr -d '"')
          
          mkdir -p release_files
          find . -name "*release.apk" -exec cp {} release_files/app-release.apk \;
          
          echo "{
            \"versionCode\": $VCODE,
            \"versionName\": \"$VNAME\",
            \"downloadUrl\": \"https://github.com/nadavyaron2-bot/recepy/raw/refs/heads/releases/app-release.apk\"
          }" > release_files/version.json
          
          echo "VCODE=$VCODE" >> $GITHUB_ENV
          echo "VNAME=$VNAME" >> $GITHUB_ENV

      - name: Push to Releases Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          
          # Create and switch to a temporary orphan branch
          git checkout --orphan releases_temp
          git rm -rf .
          cp -r release_files/* .
          git add .
          git commit -m "Build $VNAME (Code $VCODE)"
          
          # Push the content of the temporary branch to the remote 'releases' branch
          git push origin releases_temp:releases --force
