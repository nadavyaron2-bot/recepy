name: Auto Build and Update

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Update Version and Files
        run: |
          # שליפת מספר הגרסה מתוך קובץ ה-gradle
          VERSION_CODE=$(grep "versionCode" app/build.gradle | head -n 1 | awk '{print $2}' | tr -d '()= \r\n')
          
          mkdir -p update
          cp app/build/outputs/apk/debug/*.apk update/app-release.apk
          
          # יצירת ה-JSON מחדש
          echo "{
            \"versionCode\": $VERSION_CODE,
            \"versionName\": \"1.0.3-auto\",
            \"downloadUrl\": \"https://github.com/nadavyaron2-bot/recepy/raw/refs/heads/master/update/app-release.apk\"
          }" > update/version.json

      - name: Push updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add update/
          git commit -m "Auto-update APK and version.json [skip ci]" || echo "No changes"
          git push
